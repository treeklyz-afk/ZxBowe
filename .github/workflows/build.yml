name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Code Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Inject and Install Precise Core Dependencies
      - name: Auto-Inject Core Dependencies
        run: |
          npm install react-native-linear-gradient react-native-webview --save --legacy-peer-deps
          npm install --legacy-peer-deps

      # 4. Auto-Fix: Upgrade Project Compile Target to SDK 34 Natively
      - name: Auto-Fix Android SDK Target & Kotlin Mismatch
        run: |
          echo "⚠️ SDK 34 and Kotlin mismatch detect hua hai! Live patching configuration..."
          
          # Pure project templates me compile aur target SDK ko automatic 34 par replace karna
          find android/ -name "build.gradle" -type f -exec sed -i 's/compileSdkVersion = 33/compileSdkVersion = 34/g' {} +
          find android/ -name "build.gradle" -type f -exec sed -i 's/targetSdkVersion = 33/targetSdkVersion = 34/g' {} +
          find android/ -name "build.gradle" -type f -exec sed -i 's/compileSdkVersion 33/compileSdkVersion 34/g' {} +
          find android/ -name "build.gradle" -type f -exec sed -i 's/targetSdkVersion 33/targetSdkVersion 34/g' {} +
          
          echo "✅ Patch complete! Android system compile architecture updated to SDK 34."

      # 5. Setup SDK compiler tools
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 6. Grant dynamic access token to wrapper scripts
      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      # 7. Build production target bundle
      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 8. Collect output packages securely
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
