name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout codebase
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup safe node engine
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Handle dependency trees systematically
      - name: Install System Dependencies
        run: |
          npm install react-native-linear-gradient --save --legacy-peer-deps
          npm install --legacy-peer-deps

      # 4. Setup SDK compiler tools
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 5. Grant dynamic access token to wrapper scripts
      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      # 6. Build production target bundle
      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 7. Collect output packages securely
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
