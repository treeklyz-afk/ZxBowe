name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Code Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js (Node 22 use kiya hai taaki deprecation warning hat jaye)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Install Dependencies
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      # 4. Setup Java JDK 17 aur Gradle Cache
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 5. Execution Permission Dena
      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      # 6. Build Android APK (Release)
      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 7. Upload Finished APK (Auto-Fix: Wildcard use kiya hai taaki path error kabhi na aaye)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
