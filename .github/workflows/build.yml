name: Build Android APK

on:
  push:
    branches: [ main, master ] # Jab aap push karenge toh automatic chalega
  workflow_dispatch: # GitHub UI se manually chalane ke liye

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Code Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js (Error Fixed: Cache line removed to prevent lock-file error)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Node deprecation warning se bachne ke liye version 20 kiya hai

      # 3. Install Dependencies
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      # 4. Setup Java JDK 17 aur Gradle Caching
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 5. Gradlew Permission (Permission denied error se bachne ke liye)
      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      # 6. Build Android APK
      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 7. Upload Finished APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
