name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Code Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Inject and Install All Required Packages Automatically
      - name: Auto-Inject Core Dependencies
        run: |
          npm install react-native-linear-gradient react-native-webview --save --legacy-peer-deps
          npm install --legacy-peer-deps

      # 4. Auto-Fix: Resolve Android SDK 34 & AGP 8.1.1 Conflict Natively
      - name: Auto-Fix Android SDK & AGP Version Conflicts
        run: |
          echo "⚠️ Compatibility issues detect huye hain! Patching gradle configuration..."
          
          # Force check standard strict verification bypass rules
          echo "android.aarTransform.enforceCompileSdk=false" >> android/gradle.properties
          
          # Gradle framework structure ko runtime par force override karna
          echo -e "\nallprojects {\n    configurations.all {\n        resolutionStrategy {\n            force 'androidx.webkit:webkit:1.8.0'\n            force 'androidx.annotation:annotation-experimental:1.3.0'\n        }\n    }\n}" >> android/build.gradle
          
          echo "✅ Patched successfully! Webview package down-graded to stable SDK 33 architecture."

      # 5. Setup SDK compiler tools
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 6. Grant dynamic access token to wrapper scripts
      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      # 7. Build production target bundle
      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 8. Collect output packages securely
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
