name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Code Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js (Highly stable version for React Native build systems)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install 100% Compatible & Tested Stable Versions
      - name: Install Stable Dependencies
        run: |
          npm install react-native-linear-gradient@2.8.3 \
                      react-native-webview@13.6.2 \
                      @react-native-async-storage/async-storage@1.21.0 \
                      react-native-gesture-handler@2.14.0 \
                      react-native-reanimated@3.6.1 \
                      react-native-share@10.0.2 \
                      react-native-haptic-feedback@2.2.0 \
                      --save --legacy-peer-deps
          npm install --legacy-peer-deps

      # 4. Setup Java JDK 17
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 5. Grant execute permission to gradlew
      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      # 6. Build Android APK (Release)
      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 7. Upload Finished APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
