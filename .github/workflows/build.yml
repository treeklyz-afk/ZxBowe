name: Build Android APK

on:
  push:
    branches: [ main, master ] # Jab bhi aap main ya master branch par push karenge, build start ho jayega
  workflow_dispatch: # Isse aap GitHub UI se manually bhi build trigger kar sakte hain

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Repository ka code checkout karne ke liye
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Node.js setup aur caching (NPM errors aur network timeouts se bachne ke liye)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # 3. Dependencies install karna (Peer dependency conflicts ko auto-resolve karne ke liye --legacy-peer-deps lagaya hai)
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      # 4. Java JDK 17 setup (Modern React Native versions ke liye zaroori hai) aur Gradle caching
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 5. Gradlew file ko executable permission dena (Aksar "Permission Denied" error isi wajah se aata hai)
      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      # 6. Android APK Build karna (--no-daemon se CI environment me memory leak ke errors nahi aate)
      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 7. Built APK ko GitHub par upload karna taaki aap download kar sakein
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk # Agar signed hai toh app-release.apk use karein
          if-no-files-found: error
