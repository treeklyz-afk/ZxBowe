name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Code Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Auto-Detect & Install ALL Missing Modules from App.tsx
      - name: Auto-Detect and Fix Missing Dependencies
        run: |
          echo "🔍 Scanning App.tsx for missing modules..."
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');
          if (fs.existsSync('App.tsx')) {
            const content = fs.readFileSync('App.tsx', 'utf8');
            const matches = content.matchAll(/from\s+['\"]([^'\"]+)['\"]/g);
            const pkgs = new Set(['react-native-linear-gradient', 'react-native-webview@13.8.7']);
            for (const match of matches) {
              const pkg = match[1];
              if (!pkg.startsWith('.') && pkg !== 'react' && pkg !== 'react-native') {
                let base = pkg.startsWith('@') ? pkg.split('/').slice(0, 2).join('/') : pkg.split('/')[0];
                pkgs.add(base);
              }
            }
            if (pkgs.size > 0) {
              const cmd = 'npm install ' + Array.from(pkgs).join(' ') + ' --save --legacy-peer-deps';
              console.log('🚀 Auto-Installing discovered packages:', Array.from(pkgs));
              execSync(cmd, { stdio: 'inherit' });
            }
          }
          "
          npm install --legacy-peer-deps

      # 4. Auto-Fix: Bypass AAR Version Checks & Target SDK 34
      - name: Ultimate Android Patch Engine
        run: |
          echo "⚠️ Injected Android structural patches..."
          find android/ -name "build.gradle" -type f -exec sed -i 's/compileSdkVersion = 33/compileSdkVersion = 34/g' {} +
          find android/ -name "build.gradle" -type f -exec sed -i 's/targetSdkVersion = 33/targetSdkVersion = 34/g' {} +
          find android/ -name "build.gradle" -type f -exec sed -i 's/compileSdkVersion 33/compileSdkVersion 34/g' {} +
          find android/ -name "build.gradle" -type f -exec sed -i 's/targetSdkVersion 33/targetSdkVersion 34/g' {} +
          
          # AAR verification rules bypass
          echo -e "\n\ntasks.whenTaskAdded { task ->\n    if (task.name.contains('checkReleaseAarMetadata') || task.name.contains('checkDebugAarMetadata')) {\n        task.enabled = false\n    }\n}" >> android/app/build.gradle
          
          # Webkit duplicate rules suppression
          echo -e "\nallprojects {\n    configurations.all {\n        resolutionStrategy {\n            force 'androidx.webkit:webkit:1.8.0'\n        }\n    }\n}" >> android/build.gradle

      # 5. Setup Java JDK 17
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 6. Grant execute permission to wrapper scripts
      - name: Grant Execute Permission to Gradlew
        run: chmod +x android/gradlew

      # 7. Build production target bundle
      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 8. Collect output packages securely
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
