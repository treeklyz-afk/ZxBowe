name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Code Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install Dependencies
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps

      # 4. Setup Java JDK 17
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 5. Auto-Fix: Check & Generate Gradlew if missing
      - name: Check and Fix Gradlew File
        run: |
          if [ -d "android" ]; then
            cd android
            if [ ! -f "gradlew" ]; then
              echo "⚠️ gradlew file missing hai! Auto-generating gradle wrapper..."
              gradle wrapper
            fi
            echo "✅ Granting execute permission to gradlew..."
            chmod +x gradlew
          else
            echo "❌ ERROR: 'android' folder aapke GitHub repository me nahi mila! Kripya check karein ki aapne android folder push kiya hai ya nahi."
            exit 1
          fi

      # 6. Build Android APK
      - name: Build Android APK (Release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 7. Upload Finished APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
